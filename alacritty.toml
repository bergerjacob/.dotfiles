[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
bold = { family = "Hack Nerd Font Mono", style = "Bold" }
italic = { family = "Hack Nerd Font Mono", style = "Italic" }
bold_italic = { family = "Hack Nerd Font Mono", style = "Bold Italic" }
size = 12.0

[window]
startup_mode = "Maximized"
decorations_theme_variant = "Dark"

[terminal]
shell = { program = "/home/bergerj/.dotfiles/startup.sh", args = [] }
osc52 = "CopyPaste"

[keyboard]
bindings = [ 
    { key = "Return", mods = "Shift", chars = "\n" },
    { key = "Back", mods = "Control", chars = "\u0017" },
    { key = "Return", mods = "Alt", chars = "\u001b[13;3u" },
    { key = "Return", mods = "Control", chars = "\u001b[13;5u" }
]
