# So clipboard and similar doesn't break when ssh'd with -X and come back to local machine
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK"

set -g mouse on

setw -g mode-keys vi

# Send special OSC 52 escape character if I'm the remote
set -s set-clipboard on
set -g allow-passthrough on
set -sa terminal-features ',*:clipboard'
# Ensure modified keys (Shift+Enter/Ctrl+Enter) are forwarded from Alacritty
set -as terminal-features ',alacritty:extkeys'

# Vim-style copy bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Unbind right-click (MouseDown3Pane) to prevent the context menu
unbind-key -T root MouseDown3Pane

# Unbind middle-click (MouseDown2Pane) to prevent pasting
unbind-key -T root MouseDown2Pane

# Fix vim mode switching to normal mode delay
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Set the default terminal mode to 256color mode with italic support
set -g default-terminal "tmux-256color"

# Add terminal-overrides for 256-color terminals
set -ga terminal-overrides ",*256col*:Tc"

# Ensure italic support is passed through
set -ga terminal-overrides ",*:sitm=\\E[3m"
set -ga terminal-overrides ",*:ritm=\\E[23m"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-dir "~/.tmux/resurrect/"

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g base-index 1
setw -g pane-base-index 1

# Open new window in cwd
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Set status right to day, date, and 12 hour clock
set -g status-right ''

# Go to last session
bind < switch-client -l

# Kill current session and switch to the last one
bind X confirm-before -p "kill-session #S? (y/n)" "run-shell \"if [ \$(tmux ls | wc -l) -gt 1 ]; then tmux switch-client -l || tmux switch-client -n; fi; tmux kill-session -t '#S'\""

# Needed for pi agent
set -g extended-keys on
set -g extended-keys-format csi-u








# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
set -g mouse on
